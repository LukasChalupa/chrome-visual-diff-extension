<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0844;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb199;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#2d3436" />

  <!-- Left Layer (Base) -->
  <rect x="20" y="24" width="88" height="80" rx="8" fill="url(#grad1)" />

  <!-- Right Layer (New) - clipped to show diff -->
  <g clip-path="url(#diffClip)">
    <rect x="20" y="24" width="88" height="80" rx="8" fill="url(#grad2)" />
  </g>

  <clipPath id="diffClip">
    <rect x="64" y="24" width="44" height="80" />
  </clipPath>

  <!-- Split Line -->
  <line x1="64" y1="16" x2="64" y2="112" stroke="#ffffff" stroke-width="4" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Handle -->
  <circle cx="64" cy="64" r="12" fill="#ffffff" filter="url(#shadow)"/>
  <path d="M 60 59 L 55 64 L 60 69 M 68 59 L 73 64 L 68 69" stroke="#2d3436" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
