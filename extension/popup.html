<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      padding: 10px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      color: #333;
    }
    h3 {
      margin-top: 0;
      text-align: center;
      font-size: 16px;
    }
    button {
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      cursor: pointer;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
    }
    button:hover { background: #0052a3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
    .btn-secondary:hover { background: #e0e0e0; }
    
    .thumbnail-container {
      text-align: center;
      margin-bottom: 10px;
    }
    .thumbnail {
      width: 100%;
      height: auto;
      max-height: 120px;
      object-fit: contain;
      border: 1px dashed #ccc;
      display: none;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <h3>Visual Diff</h3>
  
  <div class="thumbnail-container">
    <img id="thumb1" class="thumbnail" alt="Base Screenshot" />
  </div>
  <button id="cap1">Capture Base (1)</button>
  
  <div class="thumbnail-container">
    <img id="thumb2" class="thumbnail" alt="New Screenshot" />
  </div>
  <button id="cap2">Capture New (2)</button>
  
  <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
  
  <button id="compare" disabled>Compare</button>
  <button id="clear" class="btn-secondary">Clear Images</button>

  <script src="popup.js"></script>
</body>
</html>
